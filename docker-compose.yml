networks:
  web-network:
    driver: bridge  
  logging-network:
    driver: bridge

services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web-network
      - logging-network
    restart: unless-stopped
    depends_on:
      - go-app
      - nodejs-app
      - python-app

  python-app:
    image: ${BASE_REGISTRY}:python-latest
    container_name: python-app
    expose:
      - "8080"
    networks:
      - web-network
    restart: unless-stopped

  nodejs-app:
    image: ${BASE_REGISTRY}:nodejs-latest
    container_name: nodejs-app
    expose:
      - "8080"
    networks:
      - web-network
    restart: unless-stopped

  go-app:
    image: ${BASE_REGISTRY}:go-latest
    container_name: go-app
    expose:
      - "8080"
    networks:
      - web-network
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - REPO_USER=${REGISTRY_USER}
      - REPO_PASS=${REGISTRY_PASSWORD}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN}
      - DOCKER_API_VERSION=1.44
    expose:
      - "8080"
    networks:
      - web-network
    restart: unless-stopped

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.1
    container_name: filebeat
    user: root
    command: ["filebeat", "-e", "--strict.perms=false"]
    volumes:
      - ./monitoring/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - logging-network
    restart: unless-stopped
    depends_on:
      - logstash

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.routing.allocation.disk.watermark.low=85%
      - cluster.routing.allocation.disk.watermark.high=90%
      - cluster.routing.allocation.disk.watermark.flood_stage=95%
    volumes:
      - es-data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - logging-network
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.1
    container_name: logstash
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - ./monitoring/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./monitoring/logstash-template.json:/usr/share/logstash/templates/logstash-template.json:ro
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - logging-network  
    restart: unless-stopped
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: kibana
    expose: 
      - "5601"
    environment:
      - SERVER_BASEPATH=/kibana
      - SERVER_REWRITEBASEPATH=true
    networks:
      - logging-network
    restart: unless-stopped
    depends_on:
      - elasticsearch

volumes:
  es-data:
    driver: local
