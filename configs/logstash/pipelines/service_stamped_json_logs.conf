# Логи будут прилетать из beats'ов по порту 5044
input {
  beats {
    port => 5044
  }
}

filter {
  if [fields][service] not in ["nginx", "nginx"] {
    drop {}
  }

  # Nginx пишет JSON напрямую в message
  json {
    source => "message"
  }
  
  # Используем поле time из nginx лога как timestamp
  date {
    match => ["time", "ISO8601"]
    target => "@timestamp"
    remove_field => ["time"]
  }
}

output {
  stdout {}
  elasticsearch {
    hosts => "elasticsearch:9200"
    index => "logs_%{[fields][service]}-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
  }
}
