input {
  beats {
    port => 5044
  }
}

filter {
  # Шаг 1: распаковываем Docker JSON wrapper
  json {
    source => "message"
    target => "docker_log"
  }

  # Шаг 2: роутинг по контейнеру
  if [container][name] == "nginx-proxy" {
    # nginx пишет JSON — просто парсим
    json {
      source => "[docker_log][log]"
      target => "nginx"
    }
    mutate {
      add_field => { "[@metadata][target_index]" => "nginx-logs" }
      # Поднимаем нужные поля на верхний уровень
      add_field => { "http_method" => "%{[nginx][method]}" }
      add_field => { "http_status" => "%{[nginx][status]}" }
      add_field => { "request_uri" => "%{[nginx][uri]}" }
      add_field => { "client_ip"   => "%{[nginx][ip]}" }
    }
    # Конвертируем status в число для агрегаций в Kibana
    mutate {
      convert => { "http_status" => "integer" }
      convert => { "[nginx][bytes]" => "integer" }
    }
  } else {
    mutate { add_field => { "[@metadata][target_index]" => "apps-logs" } }
    
    # Для app логов — пробуем json парс (nodejs/python могут писать json)
    json {
      source => "[docker_log][log]"
      target => "app_log"
      tag_on_failure => [] # не добавлять тег если не json — просто пропустить
    }
    
    # Если не json — оставляем сырую строку в поле message_text
    if "_jsonparsefailure" not in [tags] {
      mutate { add_field => { "message_text" => "%{[docker_log][log]}" } }
    }
  }

  # Убираем мусорные поля
  mutate {
    remove_field => ["message", "docker_log", "host", "agent", "ecs"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][target_index]}-%{+YYYY.MM.dd}"
    
    # Декларативное управление шаблонами индексов при старте Logstash
    manage_template => true
    template_name => "isdacis-logs"
    template_overwrite => true
    template => "/usr/share/logstash/templates/logstash-template.json"
  }
}
