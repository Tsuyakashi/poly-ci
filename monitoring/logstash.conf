input {
  beats {
    port => 5044
  }
}

filter {
  # Сначала парсим стандартную JSON-обертку Docker-лога, чтобы достать чистый текст
  json {
    source => "message"
    target => "docker_log"
  }

  # Если лог пришел от Nginx, разбираем структуру самого запроса
  if [container][name] == "nginx-proxy" {
    # Если у тебя в Nginx настроен json-формат логов (рекомендуется), используй это:
    json {
      source => "[docker_log][log]"
      target => "nginx"
    }
    
    # Если в Nginx остался дефолтный комбинированный формат (combined), расскомментируй grok ниже:
    # grok {
    #   match => { "[docker_log][log]" => "%{COMBINEDAPACHELOG}" }
    # }
    
    mutate {
      add_field => { "[@metadata][target_index]" => "nginx-logs" }
    }
  } else {
    # Все остальные контейнеры (go, nodejs, python)
    mutate {
      add_field => { "[@metadata][target_index]" => "apps-logs" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # Использование [@metadata] полей — лучший паттерн в Logstash, 
    # так как эти поля не записываются в сам документ Elasticsearch
    index => "%{[@metadata][target_index]}-%{+YYYY.MM.dd}"
  }
}
