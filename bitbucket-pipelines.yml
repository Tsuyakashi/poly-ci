definitions:
  services:
    docker:
      memory: 2048

pipelines:
  branches:
    main:
      - parallel:
          - step:
              name: Build Python
              runs-on:
                - self.hosted
                - linux
              services: [docker]
              condition:
                changesets:
                  includePaths:
                    - "python/**"
              script:
                - export DOCKER_BUILDKIT=0
                - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
                - docker build -t $DOCKERHUB_USERNAME/poly-ci:python-latest ./python/
                - docker push $DOCKERHUB_USERNAME/poly-ci:python-latest

          - step:
              name: Build Go
              runs-on:
                - self.hosted
                - linux
              services: [docker]
              condition:
                changesets:
                  includePaths:
                    - "go/**"
              script:
                - export DOCKER_BUILDKIT=0
                - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
                - docker build -t $DOCKERHUB_USERNAME/poly-ci:go-latest ./go/
                - docker push $DOCKERHUB_USERNAME/poly-ci:go-latest

          - step:
              name: Build Node.js
              runs-on:
                - self.hosted
                - linux
              services: [docker]
              condition:
                changesets:
                  includePaths:
                    - "nodejs/**"
              script:
                - export DOCKER_BUILDKIT=0
                - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
                - docker build -t $DOCKERHUB_USERNAME/poly-ci:nodejs-latest ./nodejs/
                - docker push $DOCKERHUB_USERNAME/poly-ci:nodejs-latest

      # Stage 2: Deploy (параллельно, через Watchtower)
      - parallel:
          - step:
              name: Deploy Python
              runs-on:
                - self.hosted
                - linux
              image: curlimages/curl:latest
              condition:
                changesets:
                  includePaths:
                    - "python/**"
              script:
                - |
                  curl -H "Authorization: Bearer $WATCHTOWER_TOKEN" \
                    -X POST "http://$PRODUCTION_IP:8080/v1/update?container=python-app" \
                    || true

          - step:
              name: Deploy Go
              runs-on:
                - self.hosted
                - linux
              image: curlimages/curl:latest
              condition:
                changesets:
                  includePaths:
                    - "go/**"
              script:
                - |
                  curl -H "Authorization: Bearer $WATCHTOWER_TOKEN" \
                    -X POST "http://$PRODUCTION_IP:8080/v1/update?container=go-app" \
                    || true

          - step:
              name: Deploy Node.js
              runs-on:
                - self.hosted
                - linux
              image: curlimages/curl:latest
              condition:
                changesets:
                  includePaths:
                    - "nodejs/**"
              script:
                - |
                  curl -H "Authorization: Bearer $WATCHTOWER_TOKEN" \
                    -X POST "http://$PRODUCTION_IP:8080/v1/update?container=nodejs-app" \
                    || true
